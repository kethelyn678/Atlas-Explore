<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
    <link rel="stylesheet" href="contato.css">
</head>
<body>
   <section class="contact-section">

  <div class="contact-container">

    <header class="contact-header">
      <h2>Entre em Contato</h2>
      <p> 
        Vamos conversar e transformar sua ideia em realidade.
      </p>
    </header>

    <!-- INFORMAÇÕES DE CONTATO -->
    <div class="contact-info">

      <div class="info-item">
        <h3>📍 Localização</h3>
        <p>Formosa - GO, Brasil</p>
      </div>

      <div class="info-item">
        <h3>📧 E-mail Profissional</h3>
        <p>contato@seudominio.com</p>
      </div>

      <div class="info-item">
        <h3>⏰ Horário de Atendimento</h3>
        <p>Segunda a Sexta — 08h às 18h</p>
      </div>

    </div>

    <!-- FORMULÁRIO -->
    <form 
      action="https://formspree.io/f/seu-email@dominio.com" 
      method="POST" 
      class="contact-form"
    >

      <div class="form-group">
        <label for="nome">Nome</label>
        <input 
          type="text" 
          id="nome" 
          name="nome" 
          placeholder="Seu nome completo" 
          required
        >
      </div>

      <div class="form-group">
        <label for="email">E-mail</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          placeholder="seu@email.com" 
          required
        >
      </div>

      <div class="form-group">
        <label for="assunto">Assunto</label>
        <input 
          type="text" 
          id="assunto" 
          name="assunto" 
          placeholder="Ex: Proposta de Projeto"
        >
      </div>

      <div class="form-group">
        <label for="mensagem">Mensagem</label>
        <textarea 
          id="mensagem" 
          name="mensagem" 
          rows="5" 
          placeholder="Descreva sua ideia ou necessidade..."
          required
        ></textarea>
      </div>

      <button type="submit" class="btn-primary">
        Enviar Mensagem
      </button>

    </form>

    <!-- REDES SOCIAIS -->
    <div class="contact-social">
      <h3>Conecte-se comigo</h3>
      <div class="social-links">
        <a href="#">LinkedIn</a>
        <a href="#">GitHub</a>
        <a href="#">Instagram</a>
      </div>
    </div>

    <!-- BOTÃO VOLTAR -->
    <div class="contact-footer">
      <a href="index.html" class="btn-secondary">
        ← Voltar para Home
      </a>
    </div>

  </div>

</section>

</section>
</div>
</body>
</html>
